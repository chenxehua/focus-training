# FocusKids Docker Compose Configuration

version: '3.8'

services:
  # ============================================================
  # API Server
  # ============================================================
  api:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: focuskids-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WEIXIN_APP_ID=${WEIXIN_APP_ID}
      - WEIXIN_APP_SECRET=${WEIXIN_APP_SECRET}
      - WEIXIN_MCH_ID=${WEIXIN_MCH_ID}
      - WEIXIN_API_KEY=${WEIXIN_API_KEY}
      - ALI_SMS_ACCESS_KEY=${ALI_SMS_ACCESS_KEY}
      - ALI_SMS_ACCESS_SECRET=${ALI_SMS_ACCESS_SECRET}
    depends_on:
      - mysql
      - redis
    networks:
      - focuskids-network
    healthcheck:
      test: ["CMD", "wget", "--no-redirect", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # MySQL Database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: focuskids-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=focuskids
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - focuskids-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:6-alpine
    container_name: focuskids-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - focuskids-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: focuskids-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "3112:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - focuskids-network

  # ============================================================
  # Prometheus Metrics (Optional)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: focuskids-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - focuskids-network

  # ============================================================
  # Grafana Dashboard (Optional)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: focuskids-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - focuskids-network

# ============================================================
# Networks
# ============================================================
networks:
  focuskids-network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local