# FocusKids Redis Configuration

# 网络配置
bind 0.0.0.0
protected-mode no
port 6379

# 持久化配置
appendonly yes
appendfsync everysec

# 内存配置
maxmemory 256mb
maxmemory-policy allkeys-lru

# 超时配置
timeout 300

# 日志配置
loglevel notice

# 客户端配置
tcp-keepalive 60

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 密码配置 (生产环境请启用)
# requirepass your_redis_password